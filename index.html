<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>NUPIEEPRO — Especialista em Gestão</title>
  
  <!-- Ícones e Web App -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/arte-logo.png">
  <link rel="icon" href="assets/arte-logo.png" type="image/png">
  
  <!-- Tipografia de Alta Qualidade -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --black:   #000000;
      --purple:  #2f1d70;
      --orange:  #f75412;
      --white:   #ffffff;
      --surface: #29324f;
      --border:  rgba(41, 50, 79, 0.4);
      --font-body: 'Inter', system-ui, sans-serif;
      --font-head: 'Plus Jakarta Sans', sans-serif;
    }

    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Background Arquitetural Especialista ─── */
    .bg-grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: 60px 60px;
      background-image: 
        linear-gradient(to right, rgba(41, 50, 79, 0.15) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(41, 50, 79, 0.15) 1px, transparent 1px);
      mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 80%);
    }

    .bg-accent {
      position: absolute;
      top: 0; right: 0;
      width: 45vw; height: 100vh;
      background: linear-gradient(135deg, rgba(47,29,112,0.1), transparent 70%);
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Layout Central ─── */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ─── Identidade Premium ─── */
    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      animation: revealUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      object-fit: contain;
      animation: floatMagnificent 4s ease-in-out infinite alternate;
    }

    @keyframes floatMagnificent {
      0% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 5px rgba(247, 84, 18, 0.3)); }
      100% { transform: translateY(-4px) scale(1.06); filter: drop-shadow(0 0 15px rgba(247, 84, 18, 0.8)); }
    }

    .logo-text {
      font-family: var(--font-head);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .logo-text span {
      color: var(--orange);
    }

    .page-title {
      font-family: var(--font-head);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      color: var(--white);
    }

    .page-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.5;
      font-weight: 400;
      max-width: 85%;
    }

    /* ─── Cartão de Formulário (Estrutural e Rígido) ─── */
    .login-card {
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 4px; /* Cantos retos, ar profissional */
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      animation: revealUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
      position: relative;
    }

    /* Detalhe arquitetural na borda do cartão */
    .login-card::before {
      content: "";
      position: absolute;
      top: -1px; left: -1px; right: 50%; height: 1px;
      background: linear-gradient(90deg, var(--purple), var(--orange));
      z-index: 1;
    }

    /* ─── Campos do Formulário ─── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.6);
    }

    .form-input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 14px 16px;
      font-family: var(--font-body);
      font-size: 15px;
      border-radius: 2px;
      outline: none;
      transition: all 0.2s ease-in-out;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .form-input:focus {
      border-color: var(--orange);
      background: rgba(247, 84, 18, 0.03);
    }

    /* ─── Botão Principal ─── */
    .btn-submit {
      margin-top: 0.5rem;
      width: 100%;
      background: var(--white);
      color: var(--black);
      border: none;
      padding: 15px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-submit:hover {
      background: var(--orange);
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(247, 84, 18, 0.2);
    }
    .btn-submit.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .btn-submit svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s;
    }
    .btn-submit:hover svg {
      transform: translateX(4px);
    }

    /* ─── Alertas ─── */
    .alert {
      display: none;
      font-size: 13px;
      padding: 12px;
      border-radius: 2px;
      font-weight: 500;
      border-left: 3px solid transparent;
    }
    .alert.error {
      display: block;
      background: rgba(240, 80, 80, 0.1);
      color: #f05050;
      border-left-color: #f05050;
    }
    .alert.success {
      display: block;
      background: rgba(45, 212, 160, 0.1);
      color: #2dd4a0;
      border-left-color: #2dd4a0;
    }

    /* ─── Rodapé do Cartão ─── */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      font-size: 12px;
    }

    .btn-link {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-weight: 500;
      transition: color 0.2s;
      font-family: var(--font-body);
    }

    .btn-link:hover {
      color: var(--white);
    }

    /* ─── Painéis Deslizantes (Reset / Convite) ─── */
    .panel-wrap {
      display: none;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      margin-top: 0.5rem;
      animation: revealDown 0.3s ease both;
    }
    .panel-wrap.open {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      color: var(--orange);
    }

    /* ─── Animações ─── */
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes revealDown {
      from { opacity: 0; height: 0; transform: translateY(-10px); }
      to   { opacity: 1; height: auto; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container { padding: 1.5rem; }
      .login-card { padding: 1.5rem; }
      .page-title { font-size: 28px; }
    }
  </style>
</head>
<body>

  <!-- Grid Arquitetural Especialista -->
  <div class="bg-grid"></div>
  <div class="bg-accent"></div>

  <div class="container">
    
    <!-- Cabeçalho -->
    <header class="brand-header">
      <div class="logo-container">
        <img src="assets/arte-logo.png" alt="NUPIEEPRO Logo" class="logo-icon">
        <div class="logo-text">NUPIE<span>EPRO</span></div>
      </div>
      <h1 class="page-title">Gestão e<br>Alta Performance.</h1>
      <p class="page-subtitle">Acesso restrito à plataforma operacional e administrativa de coordenações.</p>
    </header>

    <!-- Formulário -->
    <div class="login-card">
      <div id="loginAlert" class="alert"></div>

      <form id="loginForm" onsubmit="return false;" novalidate>
        
        <div class="form-group" style="margin-bottom: 1rem;">
          <label class="form-label" for="loginEmail">Credencial de Acesso</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="seu@email.com" required autocomplete="email">
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label class="form-label" for="loginPassword">Chave de Segurança</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button id="btnLogin" class="btn-submit" onclick="doLogin()">
          Autenticar no Sistema
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

      </form>

      <!-- Rodapé de Ações -->
      <div class="card-footer">
        <button class="btn-link" onclick="togglePanel('resetPanel')">Recuperar Chave</button>
        <button class="btn-link" onclick="togglePanel('convitePanel')">Validar Convite</button>
      </div>

      <!-- Painel: Recuperação -->
      <div id="resetPanel" class="panel-wrap">
        <div class="panel-title">Redefinir Chave</div>
        <div id="resetAlert" class="alert"></div>
        <input type="email" id="resetEmail" class="form-input" placeholder="E-mail vinculado">
        <button id="btnReset" class="btn-submit" onclick="doResetPassword()" style="background:var(--purple);color:var(--white);font-size:12px;padding:12px;">
          Enviar Link de Recuperação
        </button>
      </div>

      <!-- Painel: Convite -->
      <div id="convitePanel" class="panel-wrap">
        <div class="panel-title">Ativação por Convite</div>
        <div id="conviteAlert" class="alert"></div>
        <input type="text" id="conviteTokenInput" class="form-input" placeholder="Cole o token de acesso">
        <button class="btn-submit" onclick="activarConvite()" style="background:var(--surface);color:var(--white);font-size:12px;padding:12px;">
          Processar Convite
        </button>
      </div>

    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Inicialização e Serviço Worker
    initLoginPage();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
