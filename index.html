<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>NUPIEEPRO — Especialista em Gestão</title>
  
  <!-- Ícones e Web App -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/arte-logo.png">
  <link rel="icon" href="assets/arte-logo.png" type="image/png">
  
  <!-- Tipografia de Alta Qualidade -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --black:   #000000;
      --purple:  #2f1d70;
      --orange:  #f75412;
      --white:   #ffffff;
      --surface: #29324f;
      --border:  rgba(41, 50, 79, 0.4);
      --font-body: 'Inter', system-ui, sans-serif;
      --font-head: 'Plus Jakarta Sans', sans-serif;
    }

    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Background Arquitetural Especialista ─── */
    .bg-grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: 60px 60px;
      background-image: 
        linear-gradient(to right, rgba(41, 50, 79, 0.15) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(41, 50, 79, 0.15) 1px, transparent 1px);
      mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 80%);
    }

    .bg-accent {
      position: absolute;
      top: 0; right: 0;
      width: 45vw; height: 100vh;
      background: linear-gradient(135deg, rgba(47,29,112,0.1), transparent 70%);
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Layout Central ─── */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ─── Identidade Premium ─── */
    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      animation: revealUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      object-fit: contain;
      animation: floatMagnificent 4s ease-in-out infinite alternate;
    }

    @keyframes floatMagnificent {
      0% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 5px rgba(247, 84, 18, 0.3)); }
      100% { transform: translateY(-4px) scale(1.06); filter: drop-shadow(0 0 15px rgba(247, 84, 18, 0.8)); }
    }

    .logo-text {
      font-family: var(--font-head);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .logo-text span {
      color: var(--orange);
    }

    .page-title {
      font-family: var(--font-head);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      color: var(--white);
    }

    .page-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.5;
      font-weight: 400;
      max-width: 85%;
    }

    /* ─── Cartão de Formulário (Estrutural e Rígido) ─── */
    .login-card {
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 4px; /* Cantos retos, ar profissional */
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      animation: revealUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
      position: relative;
    }

    /* Detalhe arquitetural na borda do cartão */
    .login-card::before {
      content: "";
      position: absolute;
      top: -1px; left: -1px; right: 50%; height: 1px;
      background: linear-gradient(90deg, var(--purple), var(--orange));
      z-index: 1;
    }

    /* ─── Campos do Formulário ─── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.6);
    }

    .form-input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 14px 16px;
      font-family: var(--font-body);
      font-size: 15px;
      border-radius: 2px;
      outline: none;
      transition: all 0.2s ease-in-out;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .form-input:focus {
      border-color: var(--orange);
      background: rgba(247, 84, 18, 0.03);
    }

    /* ─── Botão Principal ─── */
    .btn-submit {
      margin-top: 0.5rem;
      width: 100%;
      background: var(--white);
      color: var(--black);
      border: none;
      padding: 15px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-submit:hover {
      background: var(--orange);
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(247, 84, 18, 0.2);
    }
    .btn-submit.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .btn-submit svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s;
    }
    .btn-submit:hover svg {
      transform: translateX(4px);
    }

    /* ─── Alertas ─── */
    .alert {
      display: none;
      font-size: 13px;
      padding: 12px;
      border-radius: 2px;
      font-weight: 500;
      border-left: 3px solid transparent;
    }
    .alert.error {
      display: block;
      background: rgba(240, 80, 80, 0.1);
      color: #f05050;
      border-left-color: #f05050;
    }
    .alert.success {
      display: block;
      background: rgba(45, 212, 160, 0.1);
      color: #2dd4a0;
      border-left-color: #2dd4a0;
    }

    /* ─── Rodapé do Cartão ─── */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      font-size: 12px;
    }

    .btn-link {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-weight: 500;
      transition: color 0.2s;
      font-family: var(--font-body);
    }

    .btn-link:hover {
      color: var(--white);
    }

    /* ── Painéis Deslizantes (Reset / Convite) ── */
    .panel-wrap {
      display: none;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      margin-top: 0.5rem;
      animation: revealDown 0.3s ease both;
    }
    .panel-wrap.open {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      color: var(--orange);
    }

    /* ── Maquinaria Industrial (Engrenagens) ── */
    .industrial-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }
    .gear-container {
      position: absolute;
      opacity: 0.3;
      filter: drop-shadow(0 0 10px rgba(247, 84, 18, 0.2));
    }
    .gear-1 { width: 400px; height: 400px; bottom: -100px; left: -100px; animation: spinGear 30s linear infinite; }
    .gear-2 { width: 300px; height: 300px; top: -50px; right: 10%; animation: spinGear 20s linear infinite reverse; }
    .gear-3 { width: 150px; height: 150px; top: 40%; left: 15%; animation: spinGear 10s linear infinite; opacity: 0.15; }

    @keyframes spinGear { 
      from { transform: rotate(0deg); } 
      to { transform: rotate(360deg); } 
    }

    .bg-blueprint {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(247, 84, 18, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(247, 84, 18, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
    }
    
    @keyframes spinRing { 100% { transform: rotate(360deg) rotateX(15deg) rotateY(15deg); } }

    /* ── Efeito Shimmer em Títulos ── */
    .shimmer-text {
      background: linear-gradient(90deg, var(--white) 0%, var(--orange) 50%, var(--white) 100%);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shimmerSweep 6s linear infinite;
    }
    @keyframes shimmerSweep { 100% { background-position: 200% center; } }

    /* ── Cursor Magnético Vercel ── */
    body { cursor: none; }
    a, button, input { cursor: none; }
    .custom-cursor {
      position: fixed; top: 0; left: 0;
      width: 14px; height: 14px;
      background-color: var(--orange);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.25s cubic-bezier(0.16, 1, 0.3, 1), height 0.25s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.25s, mix-blend-mode 0.25s;
    }
    .custom-cursor.hovering {
      width: 54px; height: 54px;
      background-color: #fff;
      mix-blend-mode: difference;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
      margin: 0;
      max-width: none;
      align-items: center;
      justify-content: space-between;
      padding: 0;
      background: none;
      z-index: 10;
    }

    .brand-section {
      padding: 5% 8%;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-section {
      width: 480px;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(40px) saturate(180%);
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      padding: 40px;
      box-shadow: -20px 0 50px rgba(0,0,0,0.5);
    }

    .login-box-inner { width: 100%; }

    .shimmer-text {
      font-size: clamp(40px, 6vw, 72px);
      line-height: 0.95;
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin-bottom: 2rem;
      letter-spacing: -2px;
    }

    @keyframes revealUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes revealDown {
      from { opacity: 0; height: 0; transform: translateY(-10px); }
      to   { opacity: 1; height: auto; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .container { flex-direction: column; height: auto; }
      .brand-section { padding: 4rem 2rem; }
      .login-section { width: 100%; border-left: none; border-top: 1px solid rgba(255,255,255,0.05); }
    }
  </style>
</head>
<body>

  <!-- Grid Arquitetural Especialista -->
  <div class="bg-blueprint"></div>
  
  <div class="industrial-stage">
    <div class="gear-container gear-1">
      <svg viewBox="0 0 100 100" fill="currentColor"><path d="M95,44.1c-0.2-2.1-0.6-4.1-1.2-6.1l-6.8-1.5c-0.5-2.2-1.3-4.2-2.3-6.1l4.1-5.6c-1.4-1.6-3-3-4.6-4.3L78.6,24.6 c-1.9-1-3.9-1.8-6.1-2.3l-1.5-6.8c-2-0.6-4-1-6.1-1.2l-1.5,6.8c-2.2,0.5-4.2,1.3-6.1,2.3l-5.6-4.1c-1.6,1.4-3,3-4.3,4.6l4.1,5.6 c-1,1.9-1.8,3.9-2.3,6.1l-6.8,1.5c-0.6,2-1,4-1.2,6.1l6.8,1.5c0.5,2.2,1.3,4.2,2.3,6.1l-4.1,5.6c1.4,1.6,3,3,4.6,4.3l5.6-4.1 c1.9,1,3.9,1.8,6.1,2.3l1.5,6.8c2,0.6,4,1,6.1,1.2l1.5-6.8c2.2-0.5,4.2-1.3,6.1-2.3l5.6,4.1c1.6-1.4,3-3,4.3-4.6l-4.1-5.6 c1-1.9,1.8-3.9,2.3-6.1L95,44.1z M50,65c-8.3,0-15-6.7-15-15s6.7-15,15-15s15,6.7,15,15S58.3,65,50,65z"/></svg>
    </div>
    <div class="gear-container gear-2">
      <svg viewBox="0 0 100 100" fill="currentColor"><path d="M95,44.1c-0.2-2.1-0.6-4.1-1.2-6.1l-6.8-1.5c-0.5-2.2-1.3-4.2-2.3-6.1l4.1-5.6c-1.4-1.6-3-3-4.6-4.3L78.6,24.6 c-1.9-1-3.9-1.8-6.1-2.3l-1.5-6.8c-2-0.6-4-1-6.1-1.2l-1.5,6.8c-2.2,0.5-4.2,1.3-6.1,2.3l-5.6-4.1c-1.6,1.4-3,3-4.3,4.6l4.1,5.6 c-1,1.9-1.8,3.9-2.3,6.1l-6.8,1.5c-0.6,2-1,4-1.2,6.1l6.8,1.5c0.5,2.2,1.3,4.2,2.3,6.1l-4.1,5.6c1.4,1.6,3,3,4.6,4.3l5.6-4.1 c1.9,1,3.9,1.8,6.1,2.3l1.5,6.8c2,0.6,4,1,6.1,1.2l1.5-6.8c2.2-0.5,4.2-1.3,6.1-2.3l5.6,4.1c1.6-1.4,3-3,4.3-4.6l-4.1-5.6 c1-1.9,1.8-3.9,2.3-6.1L95,44.1z M50,65c-8.3,0-15-6.7-15-15s6.7-15,15-15s15,6.7,15,15S58.3,65,50,65z"/></svg>
    </div>
    <div class="gear-container gear-3">
      <svg viewBox="0 0 100 100" fill="currentColor"><path d="M95,44.1c-0.2-2.1-0.6-4.1-1.2-6.1l-6.8-1.5c-0.5-2.2-1.3-4.2-2.3-6.1l4.1-5.6c-1.4-1.6-3-3-4.6-4.3L78.6,24.6 c-1.9-1-3.9-1.8-6.1-2.3l-1.5-6.8c-2-0.6-4-1-6.1-1.2l-1.5,6.8c-2.2,0.5-4.2,1.3-6.1,2.3l-5.6-4.1c-1.6,1.4-3,3-4.3,4.6l4.1,5.6 c-1,1.9-1.8,3.9-2.3,6.1l-6.8,1.5c-0.6,2-1,4-1.2,6.1l6.8,1.5c0.5,2.2,1.3,4.2,2.3,6.1l-4.1,5.6c1.4,1.6,3,3,4.6,4.3l5.6-4.1 c1.9,1,3.9,1.8,6.1,2.3l1.5,6.8c2,0.6,4,1,6.1,1.2l1.5-6.8c2.2-0.5,4.2-1.3,6.1-2.3l5.6,4.1c1.6-1.4,3-3,4.3-4.6l-4.1-5.6 c1-1.9,1.8-3.9,2.3-6.1L95,44.1z M50,65c-8.3,0-15-6.7-15-15s6.7-15,15-15s15,6.7,15,15S58.3,65,50,65z"/></svg>
    </div>
  </div>

  <main class="container">
    
    <div class="brand-section">
      <div class="logo-container" style="justify-content:flex-start; margin-bottom:2rem;">
        <img src="assets/arte-logo.png" alt="NUPIEEPRO Logo" class="logo-icon">
        <div class="logo-text">NUPIE<span>EPRO</span></div>
      </div>
      <h1 class="shimmer-text">Geração e<br>Alta Performance.</h1>
      <p style="color:var(--t-2); font-size:18px; max-width:400px; line-height:1.6;">Acesso restrito ao ecossistema industrial e operacional do núcleo.</p>
    </div>

    <div class="login-section">
      <div class="login-box-inner">
        <div id="loginAlert" class="alert"></div>

        <form id="loginForm" onsubmit="return false;" novalidate>
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label class="form-label" for="loginEmail">Identificação de Usuário</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="id@nupieepro.com" required>
          </div>

          <div class="form-group" style="margin-bottom: 2rem;">
            <label class="form-label" for="loginPassword">Token de Segurança</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
          </div>

          <button id="btnLogin" class="btn-submit" onclick="doLogin()" style="border-radius:8px;">
            Ativar Sistema
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>

        <div class="card-footer" style="margin-top:2rem;">
          <button class="btn-link" onclick="togglePanel('resetPanel')">Redefinir Acesso</button>
          <button class="btn-link" onclick="togglePanel('convitePanel')">Validar Membro</button>
        </div>

        <div id="resetPanel" class="panel-wrap">
          <div class="panel-title">Recuperação de Chave</div>
          <div id="resetAlert" class="alert"></div>
          <input type="email" id="resetEmail" class="form-input" placeholder="E-mail principal">
          <button id="btnReset" class="btn-submit" onclick="doResetPassword()" style="background:var(--p-1);margin-top:1rem;">Enviar Requisição</button>
        </div>

        <div id="convitePanel" class="panel-wrap">
          <div class="panel-title">Ativação de Credencial</div>
          <div id="conviteAlert" class="alert"></div>
          <input type="text" id="conviteTokenInput" class="form-input" placeholder="Token de convite">
          <button class="btn-submit" onclick="activarConvite()" style="background:var(--p-1);margin-top:1rem;">Ativar Agora</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Inicialização e Serviço Worker
    initLoginPage();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    // ── Cursor Magnético Vercel e Arte Cinética (Parallax) ──
    const cursor = document.createElement('div');
    cursor.className = 'custom-cursor';
    document.body.appendChild(cursor);

    let mouseX = 0, mouseY = 0;
    let cursorX = 0, cursorY = 0;
    const industrialGears = document.querySelectorAll('.gear-container');

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      
      const moveX = (mouseX - window.innerWidth / 2) * -0.01;
      const moveY = (mouseY - window.innerHeight / 2) * -0.01;
      
      industrialGears.forEach(g => {
        g.style.transform = `translate(${moveX}px, ${moveY}px)`;
      });
    });

    function renderCursor() {
      cursorX += (mouseX - cursorX) * 0.2;
      cursorY += (mouseY - cursorY) * 0.2;
      cursor.style.transform = `translate(${cursorX - 7}px, ${cursorY - 7}px)`;
      requestAnimationFrame(renderCursor);
    }
    requestAnimationFrame(renderCursor);

    document.querySelectorAll('a, button, input').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });
  </script>
</body>
</html>
