<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NUPIEEPRO">
  <title>NUPIEEPRO — Especialista em Gestão</title>
  
  <!-- Ícones e Web App -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/arte-logo.png">
  <link rel="icon" href="assets/arte-logo.png" type="image/png">
  
  <!-- Tipografia de Alta Qualidade -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --black:   #000000;
      --orange:  #f75412;
      --orange-dim: rgba(247, 84, 18, 0.15);
      --white:   #ffffff;
      --border:  rgba(255, 255, 255, 0.08);
      --font-body: 'DM Sans', sans-serif;
      --font-head: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HUD Industrial Specialist ─── */
    .hud-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      border: 1px solid rgba(247, 84, 18, 0.1);
      margin: 20px;
    }
    .hud-overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
      background-size: 100% 3px, 3px 100%;
      z-index: 10;
      opacity: 0.3;
    }
    .hud-line { position: absolute; background: rgba(247, 84, 18, 0.15); }
    .hud-v { width: 1px; height: 100%; left: 8%; }
    .hud-h { height: 1px; width: 100%; top: 12%; }
    
    .hud-tag {
      position: absolute;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--orange);
      text-transform: uppercase;
      padding: 4px 8px;
      letter-spacing: 1px;
      opacity: 0.5;
    }
    .hud-tag::after {
      content: '';
      position: absolute; left: 0; top: 0; width: 100%; height: 100%;
      background: linear-gradient(transparent, var(--orange-dim), transparent);
      animation: scanlineHUD 4s linear infinite;
    }
    .hud-tl { top: 40px; left: 40px; }
    .hud-br { bottom: 40px; right: 40px; border-right: 1px solid; border-bottom: 1px solid; }

    @keyframes scanlineHUD { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    /* ─── Background Arquitetural ─── */
    .bg-blueprint {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(247, 84, 18, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(247, 84, 18, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 1;
    }

    .industrial-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
      filter: blur(1px) grayscale(0.4);
    }
    .gear {
      position: absolute;
      opacity: 0.12;
      filter: drop-shadow(0 0 15px var(--orange-dim));
      color: var(--orange);
    }
    .gear-1 { width: 500px; height: 500px; bottom: -100px; left: -100px; animation: spinGear 50s linear infinite; }
    .gear-2 { width: 350px; height: 350px; top: -50px; right: 5%; animation: spinGear 35s linear infinite reverse; }

    @keyframes spinGear { from { transform: rotate(0); } to { transform: rotate(360deg); } }

    /* ─── Layout Master Class (Split Screen) ─── */
    .container {
      display: flex;
      width: 100%;
      height: 100vh;
      position: relative;
      z-index: 10;
    }

    .brand-section {
      flex: 1.2;
      padding: 0 8%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: revealSlideRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .login-section {
      width: 460px;
      height: 100%;
      background: rgba(5, 5, 5, 0.6);
      backdrop-filter: blur(30px) saturate(150%);
      border-left: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 60px;
      box-shadow: -20px 0 60px rgba(0,0,0,0.6);
      animation: revealSlideLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes revealSlideRight { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes revealSlideLeft { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

    .logo-container { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .logo-icon { width: 44px; height: 44px; animation: breathe 3s ease-in-out infinite alternate; }
    .logo-text { font-family: var(--font-head); font-size: 26px; font-weight: 800; }
    .logo-text span { color: var(--orange); }

    @keyframes breathe { 0% { transform: scale(1); filter: brightness(1); } 100% { transform: scale(1.08); filter: brightness(1.3) drop-shadow(0 0 10px var(--orange)); } }

    .shimmer-text {
      font-family: var(--font-head);
      font-size: clamp(40px, 5.5vw, 68px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 1.5rem;
      background: linear-gradient(90deg, #fff 0%, var(--orange) 50%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmerLines 6s linear infinite;
    }
    @keyframes shimmerLines { 100% { background-position: 200% center; } }

    .subtitle { font-size: 18px; color: rgba(255,255,255,0.5); max-width: 480px; line-height: 1.5; font-weight: 400; }

    /* ─── Form Elements ─── */
    .login-box { width: 100%; }
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; letter-spacing: 1px; }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: #fff;
      padding: 14px 18px;
      font-size: 15px;
      border-radius: 4px;
      outline: none;
      transition: all 0.25s var(--spring);
    }
    .form-input:focus {
      border-color: var(--orange);
      background: rgba(247, 84, 18, 0.05);
      box-shadow: 0 0 20px rgba(247, 84, 18, 0.1);
    }

    .btn-submit {
      width: auto;
      align-self: flex-end;
      min-width: 180px;
      background: var(--white);
      color: var(--black);
      border: none;
      padding: 12px 24px;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s;
      margin-left: auto;
    }
    .btn-submit:hover {
      background: var(--orange);
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(247, 84, 18, 0.25);
      animation: glitchMini 0.2s ease infinite;
    }
    @keyframes glitchMini { 0% { transform: translate(1px, 0); } 50% { transform: translate(-1px, 0); } 100% { transform: translate(0, 0); } }

    .card-footer { display: flex; justify-content: space-between; margin-top: 2rem; }
    .btn-link { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 12px; cursor: pointer; transition: color 0.2s; }
    .btn-link:hover { color: var(--orange); }

    .panel-wrap { display: none; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .panel-wrap.open { display: block; animation: revealUp 0.4s ease both; }
    @keyframes revealUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .alert { display: none; font-size: 13px; padding: 12px; border-radius: 4px; margin-bottom: 1.5rem; text-align: center; }
    .alert.error { display: block; background: rgba(240, 80, 80, 0.1); color: #f05050; border: 1px solid rgba(240, 80, 80, 0.2); }
    .alert.success { display: block; background: rgba(45, 212, 160, 0.1); color: #2dd4a0; border: 1px solid rgba(45, 212, 160, 0.2); }

    /* Custom Cursor */
    .custom-cursor {
      position: fixed; top: 0; left: 0; width: 12px; height: 12px;
      background: var(--orange); border-radius: 50%; pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, background 0.2s;
    }
    .custom-cursor.hovering { width: 44px; height: 44px; background: #fff; mix-blend-mode: difference; }

    @media (max-width: 900px) {
      .container { flex-direction: column; overflow-y: auto; height: auto; }
      .brand-section { padding: 80px 40px; }
      .login-section { width: 100%; height: auto; padding: 60px 40px; border-left: none; border-top: 1px solid var(--border); }
      body { overflow-y: auto; }
    }
  </style>
</head>
<body>

  <div class="bg-blueprint"></div>
  
  <div class="hud-overlay">
    <div class="hud-line hud-v"></div>
    <div class="hud-line hud-h"></div>
    <div class="hud-tag hud-tl">OS_STATUS: SECURE_CORE_v8</div>
    <div class="hud-tag hud-br">APEX INDUSTRIAL INTERFACE</div>
  </div>

  <div class="industrial-stage">
    <div class="gear gear-1">
      <svg viewBox="0 0 100 100" fill="currentColor"><path d="M95,44.1c-0.2-2.1-0.6-4.1-1.2-6.1l-6.8-1.5c-0.5-2.2-1.3-4.2-2.3-6.1l4.1-5.6c-1.4-1.6-3-3-4.6-4.3L78.6,24.6 c-1.9-1-3.9-1.8-6.1-2.3l-1.5-6.8c-2-0.6-4-1-6.1-1.2l-1.5,6.8c-2.2,0.5-4.2,1.3-6.1,2.3l-5.6-4.1c-1.6,1.4-3,3-4.3,4.6l4.1,5.6 c-1,1.9-1.8,3.9-2.3,6.1l-6.8,1.5c-0.6,2-1,4-1.2,6.1l6.8,1.5c0.5,2.2,1.3,4.2,2.3,6.1l-4.1,5.6c1.4,1.6,3,3,4.6,4.3l5.6-4.1 c1.9,1,3.9,1.8,6.1,2.3l1.5,6.8c2,0.6,4,1,6.1,1.2l1.5-6.8c2.2-0.5,4.2-1.3,6.1-2.3l5.6,4.1c1.6-1.4,3-3,4.3-4.6l-4.1-5.6 c1-1.9,1.8-3.9,2.3-6.1L95,44.1z M50,65c-8.3,0-15-6.7-15-15s6.7-15,15-15s15,6.7,15,15S58.3,65,50,65z"/></svg>
    </div>
    <div class="gear gear-2">
      <svg viewBox="0 0 100 100" fill="currentColor"><path d="M95,44.1c-0.2-2.1-0.6-4.1-1.2-6.1l-6.8-1.5c-0.5-2.2-1.3-4.2-2.3-6.1l4.1-5.6c-1.4-1.6-3-3-4.6-4.3L78.6,24.6 c-1.9-1-3.9-1.8-6.1-2.3l-1.5-6.8c-2-0.6-4-1-6.1-1.2l-1.5,6.8c-2.2,0.5-4.2,1.3-6.1,2.3l-5.6-4.1c-1.6,1.4-3,3-4.3,4.6l4.1,5.6 c-1,1.9-1.8,3.9-2.3,6.1l-6.8,1.5c-0.6,2-1,4-1.2,6.1l6.8,1.5c0.5,2.2,1.3,4.2,2.3,6.1l-4.1,5.6c1.4,1.6,3,3,4.6,4.3l5.6-4.1 c1.9,1,3.9,1.8,6.1,2.3l1.5,6.8c2,0.6,4,1,6.1,1.2l1.5-6.8c2.2-0.5,4.2-1.3,6.1-2.3l5.6,4.1c1.6-1.4,3-3,4.3-4.6l-4.1-5.6 c1-1.9,1.8-3.9,2.3-6.1L95,44.1z M50,65c-8.3,0-15-6.7-15-15s6.7-15,15-15s15,6.7,15,15S58.3,65,50,65z"/></svg>
    </div>
  </div>

  <main class="container">
    <div class="brand-section">
      <div class="logo-container">
        <img src="assets/arte-logo.png" alt="NUPIEEPRO Logo" class="logo-icon">
        <div class="logo-text">NUPIE<span>EPRO</span></div>
      </div>
      <h1 class="shimmer-text">Geração de Alta<br>Performance Industrial.</h1>
      <p class="subtitle">Nexus de gestão técnica, operacional e financeira do núcleo. Ambiente de acesso restrito de nível especialista.</p>
    </div>

    <div class="login-section">
      <div class="login-box">
        <div id="loginAlert" class="alert"></div>

        <form id="loginForm" onsubmit="return false;" novalidate>
          <div class="form-group">
            <label class="form-label" for="loginEmail">Identificação de Usuário</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="id.specialist@nupieepro.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="loginPassword">Chave de Segurança</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
          </div>

          <button id="btnLogin" class="btn-submit" onclick="doLogin()">
            Efetuar Login de Especialista
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>

        <div class="card-footer">
          <button class="btn-link" onclick="togglePanel('resetPanel')">Recuperação de Chave</button>
          <button class="btn-link" onclick="togglePanel('convitePanel')">Validação de Convite</button>
        </div>

        <div id="resetPanel" class="panel-wrap">
          <div id="resetAlert" class="alert"></div>
          <input type="email" id="resetEmail" class="form-input" placeholder="E-mail principal">
          <button id="btnReset" class="btn-submit" onclick="doResetPassword()" style="background:var(--orange); color:#fff; margin-top:1rem;">Enviar Chave</button>
        </div>

        <div id="convitePanel" class="panel-wrap">
          <div id="conviteAlert" class="alert"></div>
          <input type="text" id="conviteTokenInput" class="form-input" placeholder="Token Industrial">
          <button class="btn-submit" onclick="activarConvite()" style="background:var(--orange); color:#fff; margin-top:1rem;">Ativar Especialista</button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js?v=9"></script>
  <script src="js/app.js?v=9"></script>
  <script src="js/auth.js?v=9"></script>
  <script>
    initLoginPage();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    const cursor = document.createElement('div');
    cursor.className = 'custom-cursor';
    document.body.appendChild(cursor);

    let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
    const gears = document.querySelectorAll('.gear');

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      const moveX = (mouseX - window.innerWidth / 2) * -0.015;
      const moveY = (mouseY - window.innerHeight / 2) * -0.015;
      gears.forEach(g => { g.style.transform = `translate(${moveX}px, ${moveY}px)`; });
    });

    function tick() {
      cursorX += (mouseX - cursorX) * 0.2;
      cursorY += (mouseY - cursorY) * 0.2;
      cursor.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
      requestAnimationFrame(tick);
    }
    tick();

    document.querySelectorAll('a, button, input').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });
  </script>
</body>
</html>
