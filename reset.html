<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>NUPIEEPRO — Redefinir Senha</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/arte-logo.png">
  <link rel="icon" href="assets/arte-logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #000000;
      --purple:  #2f1d70;
      --orange:  #f75412;
      --white:   #ffffff;
      --surface: #29324f;
    }

    html { background: #000000; -webkit-font-smoothing: antialiased; }

    body {
      min-height: 100svh;
      background: #000000;
      color: #ffffff;
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-layer::before {
      content: '';
      position: absolute;
      bottom: -25%; left: -20%;
      width: 65vw; height: 75vh;
      background: radial-gradient(ellipse, rgba(47,29,112,0.45) 0%, transparent 65%);
      filter: blur(90px);
    }
    .bg-layer::after {
      content: '';
      position: absolute;
      top: -15%; right: -15%;
      width: 50vw; height: 60vh;
      background: radial-gradient(ellipse, rgba(247,84,18,0.07) 0%, transparent 60%);
      filter: blur(70px);
    }

    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      padding: 1.5rem;
      display: flex; flex-direction: column; align-items: center;
    }

    /* Logo row */
    .logo-row {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeDown 0.5s cubic-bezier(0.16,1,0.3,1) 0ms both;
    }
    .logo-row img {
      height: 80px; width: auto; object-fit: contain;
      margin-bottom: 0.75rem;
      filter: drop-shadow(0 4px 20px rgba(247,84,18,0.22));
    }
    .logo-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 24px; font-weight: 900; letter-spacing: -0.04em;
    }
    .logo-name .lo { color: #f75412; }

    /* Card */
    .card {
      width: 100%;
      position: relative;
      background: rgba(41,50,79,0.68);
      backdrop-filter: blur(36px) saturate(1.15);
      -webkit-backdrop-filter: blur(36px) saturate(1.15);
      border-radius: 24px;
      padding: 2.2rem 2rem;
      box-shadow:
        0 32px 72px -16px rgba(0,0,0,0.85),
        0 0 0 1px rgba(47,29,112,0.35) inset;
      opacity: 0;
      animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) 130ms both;
    }
    .card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(247,84,18,0.55) 0%, rgba(47,29,112,0.55) 100%);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Eyebrow */
    .eyebrow {
      display: flex; align-items: center; gap: 8px;
      font-size: 9.5px; font-weight: 800;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: #f75412; margin-bottom: 10px;
    }
    .eyebrow-line { width: 18px; height: 2px; background: #f75412; border-radius: 1px; flex-shrink: 0; }

    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 22px; font-weight: 800; margin-bottom: 6px;
    }
    .sub {
      font-size: 13px; color: rgba(255,255,255,0.38);
      line-height: 1.6; margin-bottom: 1.6rem;
    }

    /* Fields */
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block; font-size: 10px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 7px;
    }
    .field-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 14px;
      opacity: 0.28; pointer-events: none; transition: opacity 0.2s;
    }
    .field input {
      width: 100%;
      background: #000000;
      border: 1px solid rgba(41,50,79,0.95);
      border-radius: 12px;
      padding: 13px 14px 13px 43px;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      caret-color: #f75412;
    }
    .field input::placeholder { color: rgba(255,255,255,0.18); }
    .field input:focus {
      border-color: #f75412;
      background: rgba(247,84,18,0.04);
      box-shadow: 0 0 0 3px rgba(247,84,18,0.12);
    }
    .field-wrap:focus-within .field-icon { opacity: 0.70; }

    /* Alert */
    .alert {
      display: none; padding: 11px 14px; border-radius: 11px;
      font-size: 13px; font-weight: 500; margin-bottom: 1rem; line-height: 1.45;
    }
    .alert.error   { display:block; background:rgba(240,80,80,0.10); border:1px solid rgba(240,80,80,0.22); color:#f09090; }
    .alert.success { display:block; background:rgba(45,212,160,0.09); border:1px solid rgba(45,212,160,0.20); color:#2dd4a0; }

    /* Button */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      background: linear-gradient(135deg, #f75412 0%, #2f1d70 100%);
      color: #fff;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 28px -6px rgba(247,84,18,0.40);
      position: relative; overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.10) 0%, transparent 55%);
      border-radius: inherit; pointer-events: none;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 36px -8px rgba(247,84,18,0.52); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; pointer-events: none; }

    .back-link {
      display: block; text-align: center; margin-top: 1.2rem;
      font-size: 12px; color: rgba(255,255,255,0.35);
    }
    .back-link a {
      color: rgba(255,255,255,0.65); font-weight: 600;
      text-decoration: none; transition: color 0.2s;
    }
    .back-link a:hover { color: #f75412; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 1.8rem 1.4rem; border-radius: 20px; }
      .card::before { border-radius: 20px; }
    }
  </style>
</head>
<body>

  <div class="bg-layer" aria-hidden="true"></div>

  <div class="wrap">

    <div class="logo-row">
      <img src="assets/arte-logo.png" alt="NUPIEEPRO">
      <div class="logo-name">NUPIE<span class="lo">EPRO</span></div>
    </div>

    <div class="card" id="card">
      <div class="eyebrow"><span class="eyebrow-line"></span>Segurança</div>
      <h1>Nova Senha</h1>
      <p class="sub">Digite e confirme sua nova senha de acesso ao sistema.</p>

      <div id="resetAlert" class="alert"></div>

      <form id="resetForm" onsubmit="return false;" novalidate>
        <div class="field">
          <label>Nova Senha</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input type="password" id="newPassword"
                   placeholder="Mínimo 6 caracteres"
                   minlength="6" required autocomplete="new-password">
          </div>
        </div>
        <div class="field">
          <label>Confirmar Senha</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input type="password" id="confirmPassword"
                   placeholder="Repita a senha"
                   minlength="6" required autocomplete="new-password">
          </div>
        </div>
        <button id="btnSave" class="btn" type="button" onclick="salvarNovaSenha()">
          Salvar nova senha
        </button>
      </form>

      <p class="back-link">Lembrou a senha? <a href="index.html">← Voltar ao login</a></p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    function showAlert(msg, type) {
      const el = document.getElementById('resetAlert');
      el.textContent = msg;
      el.className = 'alert ' + type;
    }

    _sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        showAlert('Link válido. Digite sua nova senha abaixo.', 'success');
      } else if (event === 'SIGNED_IN' && session) {
        setTimeout(() => App.redirect('dashboard.html'), 1500);
      }
    });

    async function salvarNovaSenha() {
      const pw = document.getElementById('newPassword').value;
      const cf = document.getElementById('confirmPassword').value;
      if (pw.length < 6) { showAlert('Senha deve ter pelo menos 6 caracteres.', 'error'); return; }
      if (pw !== cf)      { showAlert('As senhas não coincidem.', 'error'); return; }

      const btn = document.getElementById('btnSave');
      btn.disabled = true; btn.textContent = 'Salvando...';

      try {
        const { error } = await _sb.auth.updateUser({ password: pw });
        if (error) throw error;
        showAlert('Senha alterada com sucesso! Redirecionando...', 'success');
        setTimeout(() => App.redirect('index.html'), 2000);
      } catch (err) {
        showAlert(err.message || 'Erro ao salvar. Tente novamente.', 'error');
        btn.disabled = false; btn.textContent = 'Salvar nova senha';
      }
    }
  </script>
</body>
</html>
