<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#361f64">
  <title>NUPIEEPRO — Redefinir Senha</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple:   #361f64;
      --purple-l: #7c52c8;
      --orange:   #f75412;
      --white:    #ffffff;
      --slate:    #919ABB;
      --w40:      rgba(145,154,187,0.6);
    }
    html, body {
      height: 100%; background: #000000; color: var(--white);
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(54,31,100,0.55) 0%, transparent 60%);
    }
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      margin: 1.5rem;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(124,82,200,0.18);
      border-radius: 24px;
      padding: 2.8rem 2.5rem;
      box-shadow: 0 40px 80px -20px rgba(0,0,0,0.95), 0 0 0 1px rgba(54,31,100,0.1);
      animation: fadeIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .logo-row {
      display: flex; align-items: center; gap: 14px; margin-bottom: 2rem;
    }
    .logo-row img { width: 44px; height: 44px; object-fit: contain; }
    .logo-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 20px; font-weight: 900; letter-spacing: -0.02em;
    }
    .logo-name .lo { color: var(--purple-l); text-shadow: 0 0 20px rgba(124,82,200,0.6); }

    .eyebrow {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--purple-l); font-weight: 600; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .eyebrow::before { content:''; display:inline-block; width:16px; height:2px; background:var(--purple-l); border-radius:1px; }

    h1 { font-family:'Plus Jakarta Sans',sans-serif; font-size:24px; font-weight:800; margin-bottom:6px; }
    .sub { font-size:13px; color:var(--w40); margin-bottom:1.8rem; line-height:1.5; }

    .field { margin-bottom: 1.2rem; }
    .field label { display:block; font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--w40); margin-bottom:7px; }
    .field-wrap { position: relative; }
    .field-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:14px; opacity:0.38; pointer-events:none; }
    .field input {
      width:100%; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.09);
      border-radius:12px; padding:12px 13px 12px 40px; color:var(--white);
      font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:all 0.2s;
    }
    .field input::placeholder { color:rgba(255,255,255,0.18); }
    .field input:focus { border-color:rgba(124,82,200,0.5); background:rgba(54,31,100,0.08); box-shadow:0 0 0 4px rgba(54,31,100,0.12); }

    .alert {
      display:none; padding:10px 14px; border-radius:10px;
      font-size:13px; font-weight:500; margin-bottom:1rem; line-height:1.4;
    }
    .alert.error   { display:block; background:rgba(240,112,112,0.1); border:1px solid rgba(240,112,112,0.22); color:#f09595; }
    .alert.success { display:block; background:rgba(45,212,160,0.1);  border:1px solid rgba(45,212,160,0.2);  color:#2dd4a0; }

    .btn {
      width:100%; padding:13px; border:none; border-radius:12px; cursor:pointer;
      font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700;
      letter-spacing:0.06em; text-transform:uppercase;
      background: linear-gradient(135deg, var(--purple), #5c2fa8);
      color:var(--white); transition:all 0.25s ease;
      box-shadow: 0 8px 24px -8px rgba(54,31,100,0.65);
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 14px 32px -8px rgba(54,31,100,0.8); }
    .btn:disabled { opacity:0.6; pointer-events:none; }

    .back-link {
      display:block; text-align:center; margin-top:1.4rem;
      font-size:12px; color:var(--w40); text-decoration:none;
    }
    .back-link a { color:var(--purple-l); font-weight:600; }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="card" id="card">
    <div class="logo-row">
      <img src="assets/logo.png" alt="NUPIEEPRO">
      <div class="logo-name">NUPIE<span class="lo">EPRO</span></div>
    </div>

    <div class="eyebrow">Segurança</div>
    <h1>Nova Senha</h1>
    <p class="sub">Digite e confirme sua nova senha de acesso ao sistema.</p>

    <div id="resetAlert" class="alert"></div>

    <form id="resetForm" onsubmit="return false;">
      <div class="field">
        <label>Nova Senha</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" minlength="6" required autocomplete="new-password">
        </div>
      </div>
      <div class="field">
        <label>Confirmar Senha</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input type="password" id="confirmPassword" placeholder="Repita a senha" minlength="6" required autocomplete="new-password">
        </div>
      </div>
      <button id="btnSave" class="btn" type="button" onclick="salvarNovaSenha()">Salvar nova senha</button>
    </form>

    <p class="back-link">Lembrou a senha? <a href="index.html">Voltar ao login</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    function showAlert(msg, type) {
      const el = document.getElementById('resetAlert');
      el.textContent = msg;
      el.className = 'alert ' + type;
    }

    // Supabase envia o token de recuperação via hash na URL
    // O SDK captura automaticamente via onAuthStateChange
    _sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Sessão de recuperação ativa — formulário já visível
        showAlert('Link válido. Digite sua nova senha abaixo.', 'success');
      } else if (event === 'SIGNED_IN' && session) {
        // Senha redefinida com sucesso, redireciona
        setTimeout(() => App.redirect('dashboard.html'), 1500);
      }
    });

    async function salvarNovaSenha() {
      const pw = document.getElementById('newPassword').value;
      const cf = document.getElementById('confirmPassword').value;

      if (pw.length < 6) { showAlert('Senha deve ter pelo menos 6 caracteres.', 'error'); return; }
      if (pw !== cf) { showAlert('As senhas não coincidem.', 'error'); return; }

      const btn = document.getElementById('btnSave');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      try {
        const { error } = await _sb.auth.updateUser({ password: pw });
        if (error) throw error;
        showAlert('Senha alterada com sucesso! Redirecionando...', 'success');
        setTimeout(() => App.redirect('index.html'), 2000);
      } catch (err) {
        showAlert(err.message || 'Erro ao salvar senha. Tente novamente.', 'error');
        btn.disabled = false;
        btn.textContent = 'Salvar nova senha';
      }
    }
  </script>
</body>
</html>
