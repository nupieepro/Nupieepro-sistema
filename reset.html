<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d1f6f">
  <title>NUPIEEPRO — Redefinir Senha</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/arte-logo.png">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #2d1f6f;
      --orange:#f75412;
      --white: #ffffff;
      --lav:   rgba(200,188,240,0.55);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    /* Background layers */
    .bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .bg::before {
      content: '';
      position: absolute;
      top: -30%; right: -25%;
      width: 85vw; height: 85vh;
      background: radial-gradient(ellipse, rgba(247,84,18,0.11) 0%, transparent 65%);
      filter: blur(55px);
      animation: glow 16s ease-in-out infinite alternate;
    }
    .bg::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(to top, rgba(12,6,35,0.7), transparent);
    }
    .bg-dots {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }
    @keyframes glow {
      0%   { transform: scale(1); }
      100% { transform: scale(1.25) translate(-30px, 20px); }
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      margin: 1.5rem;
      background: rgba(6, 3, 20, 0.65);
      backdrop-filter: blur(44px);
      -webkit-backdrop-filter: blur(44px);
      border: 1px solid rgba(247,120,50,0.13);
      border-top-color: rgba(255,255,255,0.08);
      border-radius: 26px;
      padding: 2.8rem 2.5rem;
      box-shadow:
        0 40px 80px -16px rgba(0,0,0,0.85),
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 0 0 1px rgba(247,84,18,0.04) inset;
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo row */
    .logo-row {
      display: flex; align-items: center; gap: 13px; margin-bottom: 2rem;
    }
    .logo-row img {
      width: 44px; height: 44px; object-fit: contain;
      border-radius: 10px;
      filter: drop-shadow(0 0 16px rgba(247,84,18,0.5));
    }
    .logo-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 20px; font-weight: 900; letter-spacing: -0.03em;
    }
    .logo-name .lo {
      color: #f75412;
      text-shadow: 0 0 24px rgba(247,84,18,0.55);
    }

    /* Eyebrow */
    .eyebrow {
      display: flex; align-items: center; gap: 9px;
      font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase;
      color: #f75412; font-weight: 700; margin-bottom: 10px;
    }
    .eyebrow-line { width: 18px; height: 2px; background: #f75412; border-radius: 1px; flex-shrink: 0; }

    h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 25px; font-weight: 800; margin-bottom: 7px; }
    .sub { font-size: 13px; color: var(--lav); margin-bottom: 1.8rem; line-height: 1.55; }

    /* Fields */
    .field { margin-bottom: 1.2rem; }
    .field label {
      display: block; font-size: 10px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(200,188,240,0.48); margin-bottom: 7px;
    }
    .field-wrap { position: relative; }
    .field-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.35; pointer-events: none; }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 13px;
      padding: 13px 14px 13px 43px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 14px; outline: none; transition: all 0.22s;
      caret-color: #f75412;
    }
    .field input::placeholder { color: rgba(200,188,240,0.22); }
    .field input:focus {
      border-color: rgba(247,84,18,0.55);
      background: rgba(247,84,18,0.05);
      box-shadow: 0 0 0 4px rgba(247,84,18,0.10);
    }

    /* Alert */
    .alert {
      display: none; padding: 11px 14px; border-radius: 11px;
      font-size: 13px; font-weight: 500; margin-bottom: 1.1rem; line-height: 1.45;
    }
    .alert.error   { display: block; background: rgba(240,112,112,0.10); border: 1px solid rgba(240,112,112,0.22); color: #f09595; }
    .alert.success { display: block; background: rgba(45,212,160,0.09);  border: 1px solid rgba(45,212,160,0.20);  color: #2dd4a0; }

    /* Button */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 13px; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      background: linear-gradient(135deg, #f75412 0%, #c94000 100%);
      color: #fff; transition: all 0.25s ease; position: relative; overflow: hidden;
      box-shadow: 0 8px 32px -6px rgba(247,84,18,0.60), inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 55%);
      border-radius: inherit; pointer-events: none;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 16px 44px -8px rgba(247,84,18,0.72); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; pointer-events: none; }

    .back-link {
      display: block; text-align: center; margin-top: 1.4rem;
      font-size: 12px; color: rgba(200,188,240,0.45);
    }
    .back-link a {
      color: rgba(200,188,240,0.8); font-weight: 600;
      text-decoration: none; transition: color 0.2s;
    }
    .back-link a:hover { color: #fff; }
  </style>
</head>
<body>

  <div class="bg"><div class="bg-dots"></div></div>

  <div class="card" id="card">
    <div class="logo-row">
      <img src="assets/arte-logo.png" alt="NUPIEEPRO">
      <div class="logo-name">NUPIE<span class="lo">EPRO</span></div>
    </div>

    <div class="eyebrow"><span class="eyebrow-line"></span>Segurança</div>
    <h1>Nova Senha</h1>
    <p class="sub">Digite e confirme sua nova senha de acesso ao sistema.</p>

    <div id="resetAlert" class="alert"></div>

    <form id="resetForm" onsubmit="return false;">
      <div class="field">
        <label>Nova Senha</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" minlength="6" required autocomplete="new-password">
        </div>
      </div>
      <div class="field">
        <label>Confirmar Senha</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input type="password" id="confirmPassword" placeholder="Repita a senha" minlength="6" required autocomplete="new-password">
        </div>
      </div>
      <button id="btnSave" class="btn" type="button" onclick="salvarNovaSenha()">
        Salvar nova senha
      </button>
    </form>

    <p class="back-link">Lembrou a senha? <a href="index.html">Voltar ao login</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    function showAlert(msg, type) {
      const el = document.getElementById('resetAlert');
      el.textContent = msg;
      el.className = 'alert ' + type;
    }

    _sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        showAlert('Link válido. Digite sua nova senha abaixo.', 'success');
      } else if (event === 'SIGNED_IN' && session) {
        setTimeout(() => App.redirect('dashboard.html'), 1500);
      }
    });

    async function salvarNovaSenha() {
      const pw = document.getElementById('newPassword').value;
      const cf = document.getElementById('confirmPassword').value;
      if (pw.length < 6) { showAlert('Senha deve ter pelo menos 6 caracteres.', 'error'); return; }
      if (pw !== cf)      { showAlert('As senhas não coincidem.', 'error'); return; }
      const btn = document.getElementById('btnSave');
      btn.disabled = true; btn.textContent = 'Salvando...';
      try {
        const { error } = await _sb.auth.updateUser({ password: pw });
        if (error) throw error;
        showAlert('Senha alterada com sucesso! Redirecionando...', 'success');
        setTimeout(() => App.redirect('index.html'), 2000);
      } catch (err) {
        showAlert(err.message || 'Erro ao salvar. Tente novamente.', 'error');
        btn.disabled = false; btn.textContent = 'Salvar nova senha';
      }
    }
  </script>
</body>
</html>
