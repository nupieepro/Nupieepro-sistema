<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo preto -->
  <rect width="512" height="512" fill="#000000"/>
  <!-- Placa roxa arredondada -->
  <rect x="36" y="36" width="440" height="440" rx="96" fill="#2d1f6f"/>
  <!-- Reflexo sutil no topo da placa -->
  <rect x="36" y="36" width="440" height="180" rx="96" fill="url(#shine)"/>
  <!-- Barra esquerda N -->
  <rect x="108" y="118" width="70" height="276" rx="10" fill="#ffffff"/>
  <!-- Barra direita N -->
  <rect x="334" y="118" width="70" height="276" rx="10" fill="#ffffff"/>
  <!-- Diagonal N -->
  <polygon points="178,118 250,118 406,394 334,394" fill="#ffffff"/>
  <!-- Ponto laranja accent -->
  <circle cx="392" cy="116" r="44" fill="#f75412"/>
  <circle cx="392" cy="116" r="27" fill="#000000"/>
  <!-- Definições -->
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
