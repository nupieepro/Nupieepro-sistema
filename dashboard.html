<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D0B2B">
  <title>NUPIEEPRO — Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell" id="appShell">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div>
          <div class="sidebar-logo-text">NUPIE<span>EPRO</span></div>
          <div class="sidebar-logo-sub">Sistema de Gestão</div>
        </div>
      </div>

      <nav id="sideNav">
        <!-- Populated by JS based on user role/coord -->
      </nav>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="u-avatar" id="sideAvatar">?</div>
          <div>
            <div class="u-name" id="sideName">Carregando...</div>
            <div class="u-role" id="sideRole">—</div>
          </div>
        </div>
        <button class="btn-logout" onclick="doLogout()">Sair</button>
      </div>
    </aside>

    <!-- ═══ MAIN AREA ═══ -->
    <div class="main-area">

      <!-- ═══ PAGE: DASHBOARD ═══ -->
      <div class="page active" id="page-dashboard">
        <div class="topbar">
          <div>
            <button class="topbar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
            <div class="topbar-title" id="dashTitle">Dashboard</div>
            <div class="topbar-sub">Visão geral</div>
          </div>
          <div class="topbar-right">
            <button class="notif-btn" onclick="goTo('notificacoes')">
              🔔 <span class="notif-badge" id="notifBadge">0</span>
            </button>
          </div>
        </div>

        <div class="content">
          <!-- KPI Summary -->
          <div class="summary-grid">
            <div class="sum-card hl clickable" onclick="goTo('abj')">
              <div class="sum-label">Pontos ABJ</div>
              <div class="sum-value text-orange" id="dashPts">0</div>
              <div class="sum-sub">meta: 882 pts</div>
              <div class="sum-bar-w"><div class="sum-bar" id="dashPtsBar" style="background:var(--orange);width:0%"></div></div>
            </div>
            <div class="sum-card clickable" onclick="goTo('tarefas')">
              <div class="sum-label">Tarefas ativas</div>
              <div class="sum-value" id="dashTasks">0</div>
              <div class="sum-sub" id="dashTasksSub">—</div>
            </div>
            <div class="sum-card">
              <div class="sum-label">Membros</div>
              <div class="sum-value" id="dashMembers">16</div>
              <div class="sum-sub">6 coordenadorias</div>
            </div>
            <div class="sum-card clickable" onclick="goTo('financeiro')">
              <div class="sum-label">Saldo</div>
              <div class="sum-value" style="color:var(--green)" id="dashSaldo">R$ 0</div>
              <div class="sum-sub" id="dashSaldoSub">—</div>
            </div>
          </div>

          <!-- ABJ Progress -->
          <div class="section-card">
            <div class="section-title">Progresso Selo ABJ 2026</div>
            <div class="progress-track" style="height:14px;">
              <div class="progress-fill" id="dashAbjBar" style="width:0%"></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:6px;">
              <span class="text-sm text-muted" id="dashAbjPct">0%</span>
              <span class="text-sm text-muted">882 pts</span>
            </div>
          </div>

          <!-- Quick actions per coord -->
          <div class="section-card" id="dashQuickActions">
            <div class="section-title">Ações rápidas</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;" id="quickBtns">
              <!-- Populated by JS -->
            </div>
          </div>

          <!-- Recent activity -->
          <div class="section-card">
            <div class="section-title">Atividade recente</div>
            <div id="dashRecent">
              <p class="text-muted text-sm">Carregando...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Future pages: ABJ, Tarefas, Pessoas, Projetos, Operações, Marketing, Financeiro, etc. -->
      <!-- Will be added in FASE 2 -->

    </div>

    <!-- ═══ MOBILE NAV ═══ -->
    <nav class="mobile-nav" id="mobileNav">
      <!-- Populated by JS -->
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Init dashboard
    (async () => {
      const profile = await App.initDashboard();
      if (profile) {
        Dashboard.render(profile);
      }
    })();
  </script>
</body>
</html>
