name: Deploy NUPIEEPRO

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar js/config.defaults.js a partir dos Secrets
        env:
          NUPI_URL: ${{ secrets.SUPABASE_URL }}
          NUPI_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "window.NUPI_URL = '$NUPI_URL';" > js/config.defaults.js
          echo "window.NUPI_KEY = '$NUPI_KEY';" >> js/config.defaults.js
          echo "Config gerado com URL: ${NUPI_URL:0:30}..."

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artefatos
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
